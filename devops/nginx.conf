# nginx as a thin reverse proxy in front of the Elixir app.
# TLS is handled by Cloudflare (edge) + the cloudflared tunnel, so this hop is plain HTTP on the
# loopback-published port only. (See the SSL variant in the chat/README if you ever want origin TLS.)

server {
    listen      4024;
    listen      [::]:4024;
    server_name _;

    # The only body the app accepts is a ~64KB ciphertext blob (it hard-caps at 100KB). Reject larger early.
    client_max_body_size 256k;

    location / {
        proxy_pass http://app:4000;
        proxy_http_version 1.1;

        # Preserve the real client IP so the app's per-IP rate-limiting works (REAL_IP_HEADER=cf-connecting-ip).
        # Cloudflare sets CF-Connecting-IP at the edge; pass it through unchanged.
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection        "";   # HTTP/1.1 keepalive to upstream (not a websocket upgrade)
    }
}
